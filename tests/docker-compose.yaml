services:
  fuseki:
    image: aksw/fuseki-plus:6.1.0
    user: "${APP_UID}:${APP_GID}"
    environment:
      - FUSEKI_BASE=/fuseki/run
    volumes:
      - ./run:/fuseki/run:rw
      - ./config.ttl:/fuseki/run/config.ttl
      - ./test.service.ttl:/fuseki/run/configuration/test.service.ttl
      - ./local-plugin.jar:/fuseki/run/test-plugins/local-plugin.jar
      # - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "curl -f -s -o /dev/null -w '%{http_code}' 'http://localhost:3030/test' --data-urlencode 'query=SELECT * { ?s a ?o } LIMIT 1' | grep -q '^200$'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
